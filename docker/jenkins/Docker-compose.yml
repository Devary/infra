version: "3.9"

services:
  jenkins:
    image: jenkins/jenkins:lts-jdk21
    container_name: jenkins
    restart: unless-stopped

    # Jenkins UI + agents
    ports:
      - "8787:8787"
      - "50000:50000"

    environment:
      # Force Jenkins to run on 8787 internally
      - JENKINS_OPTS=--httpPort=8787
      - JAVA_OPTS=-Xms1g -Xmx2g -Djenkins.install.runSetupWizard=true

    # Needed if Jenkins builds Docker images
    user: root

    volumes:
      # Persistent Jenkins data
      - ./jenkins_home:/var/jenkins_home

      # Docker access from pipelines
      - /var/run/docker.sock:/var/run/docker.sock

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8787/login"]
      interval: 30s
      timeout: 10s
      retries: 5