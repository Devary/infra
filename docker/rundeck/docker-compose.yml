version: "3.9"

services:
  rundeck-db:
    image: postgres:16
    container_name: rundeck-db
    restart: unless-stopped

    environment:
      POSTGRES_DB: rundeck
      POSTGRES_USER: rundeck
      POSTGRES_PASSWORD: rundeck_password_change_me

    # 👇 ONLY THIS CHANGES
    ports:
      - "5544:5432"

    volumes:
      - rundeck_db_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rundeck -d rundeck"]
      interval: 5s
      timeout: 3s
      retries: 30


  rundeck:
    image: rundeck/rundeck:5.5.0
    container_name: rundeck
    restart: unless-stopped

    depends_on:
      rundeck-db:
        condition: service_healthy

    ports:
      - "4440:4440"

    environment:
      TZ: "Europe/Luxembourg"
      RUNDECK_GRAILS_URL: "http://localhost:4440"

      RUNDECK_ADMIN_USER: "admin"
      RUNDECK_ADMIN_PASSWORD: "admin_change_me"

      # ⚠️ STILL 5432 (internal docker network)
      RUNDECK_DATABASE_DRIVER: "org.postgresql.Driver"
      RUNDECK_DATABASE_URL: "jdbc:postgresql://rundeck-db:5432/rundeck"
      RUNDECK_DATABASE_USERNAME: "rundeck"
      RUNDECK_DATABASE_PASSWORD: "rundeck_password_change_me"

      RUNDECK_SECURITY_COOKIEKEY: "change_me_to_a_long_random_string"
      JAVA_OPTS: "-Xms512m -Xmx2g"

    volumes:
      - rundeck_server_data:/home/rundeck/server/data
      - rundeck_projects:/home/rundeck/projects
      - rundeck_var:/home/rundeck/var

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4440/api/45/system/info >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10


volumes:
  rundeck_db_data:
  rundeck_server_data:
  rundeck_projects:
  rundeck_var: